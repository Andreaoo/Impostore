<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gioco dell'Impostore</title>

<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    color:white;
    font-family:'Exo 2',sans-serif;
    min-height:100vh;
    padding:20px;
    text-align:center;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    font-family:'Orbitron',sans-serif;
    color:#facc15;
    margin-bottom:25px;
    margin-top:20px;
    font-size:2rem;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.hidden{
    display:none;
}

button{
    border:none;
    padding:14px 22px;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
    margin:8px;
    font-size:15px;
    color:white;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

button:hover{
    transform:scale(1.03);
}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    background:#0f172a;
    color:white;
}

label{
    display:block;
    margin-top:18px;
    text-align:left;
    color:#93c5fd;
}

.player{
    background:#0f172a;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
}

.big{
    font-size:2rem;
    font-weight:900;
    color:#facc15;
}

.red{ color:#ef4444; }
.green{ color:#22c55e; }

.code{
    font-size:2rem;
    color:#facc15;
    font-weight:900;
    letter-spacing:3px;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<h1>🕵️ Gioco dell'Impostore</h1>

<!-- SCELTA MODALITÀ -->
<div class="card" id="modeArea">

    <h2>Scegli modalità</h2>

    <button onclick="selectMode('offline')">🟢 Offline</button>
    <button onclick="selectMode('online')">🔵 Online</button>

</div>

<!-- OFFLINE -->
<div class="card hidden" id="offlineSetup">

    <h2>Modalità Offline</h2>

    <label>Numero giocatori</label>
    <input type="number" id="offlinePlayers" value="5" min="3" max="20">

    <label>Numero impostori</label>
    <input type="number" id="offlineImpostors" value="1" min="1" max="5">

    <label>Categoria</label>
    <select id="offlineCategory">
        <option value="calcio">Calcio</option>
        <option value="musica">Musica</option>
        <option value="film">Film</option>
    </select>

    <button onclick="startOffline()">▶ Inizia partita</button>

</div>

<!-- ONLINE MENU -->
<div class="card hidden" id="onlineMenu">

    <h2>Modalità Online</h2>

    <button onclick="showCreateRoom()">👑 Crea stanza</button>
    <button onclick="showJoinRoom()">🔑 Entra stanza</button>

</div>

<!-- CREA STANZA -->
<div class="card hidden" id="createRoomArea">

    <h2>Crea stanza</h2>

    <label>Tuo nome</label>
    <input type="text" id="hostName">

    <label>Numero giocatori</label>
    <input type="number" id="roomPlayers" value="5">

    <label>Numero impostori</label>
    <input type="number" id="roomImpostors" value="1">

    <label>Categoria</label>
    <select id="roomCategory">
        <option value="calcio">Calcio</option>
        <option value="musica">Musica</option>
        <option value="film">Film</option>
    </select>

    <button onclick="createRoom()">🎮 Crea stanza</button>

</div>

<!-- JOIN ROOM -->
<div class="card hidden" id="joinRoomArea">

    <h2>Entra in stanza</h2>

    <label>Nome</label>
    <input type="text" id="joinName">

    <label>Codice stanza</label>
    <input type="text" id="joinCode">

    <button onclick="joinRoom()">🚪 Entra</button>

</div>

<!-- LOBBY -->
<div class="card hidden" id="lobbyArea">

    <h2>Lobby</h2>

    <div>Codice stanza:</div>
    <div class="code" id="roomCodeText"></div>

    <div id="playersList"></div>

    <button id="startBtn" class="hidden" onclick="startOnlineGame()">
        ▶ Avvia partita
    </button>

</div>

<!-- ROLE -->
<div class="card hidden" id="roleArea">

    <h2>Il tuo ruolo</h2>

    <div id="roleCard"></div>

</div>

</div>

<script>

/* FIREBASE */
const firebaseConfig = {
    apiKey: "INSERISCI_APIKEY",
    authDomain: "INSERISCI_AUTHDOMAIN",
    databaseURL: "INSERISCI_DATABASE_URL",
    projectId: "INSERISCI_PROJECT_ID",
    storageBucket: "INSERISCI_BUCKET",
    messagingSenderId: "INSERISCI_SENDER",
    appId: "INSERISCI_APPID"
};

let db = null;

if(firebaseConfig.apiKey !== "INSERISCI_APIKEY"){
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
}

/* PAROLE */
const words = {
    calcio:["Messi","Rigore","Champions League","Juventus","Milan"],
    musica:["Spotify","Rap","Concerto","Chitarra","Pianoforte"],
    film:["Batman","Marvel","Netflix","Titanic","Harry Potter"]
};

/* VARIABILI */
let gameMode = "";
let roomCode = "";
let playerId = "";
let isHost = false;

/* MODALITÀ */
function selectMode(mode){
    gameMode = mode;
    document.getElementById("modeArea").classList.add("hidden");

    if(mode === "offline"){
        document.getElementById("offlineSetup").classList.remove("hidden");
    }

    if(mode === "online"){
        if(!db){
            alert("Firebase non configurato.");
            document.getElementById("modeArea").classList.remove("hidden");
            return;
        }
        document.getElementById("onlineMenu").classList.remove("hidden");
    }
}

/* =========================
   OFFLINE FIXATO
========================= */
function startOffline(){

    const players = parseInt(document.getElementById("offlinePlayers").value);
    const impostors = parseInt(document.getElementById("offlineImpostors").value);
    const category = document.getElementById("offlineCategory").value;

    const secretWord = words[category][Math.floor(Math.random()*words[category].length)];

    let impostorIndexes = [];

    while(impostorIndexes.length < impostors){
        let rand = Math.floor(Math.random()*players);
        if(!impostorIndexes.includes(rand)){
            impostorIndexes.push(rand);
        }
    }

    let currentPlayer = 0;

    const offlineArea = document.getElementById("offlineSetup");

    offlineArea.innerHTML = `
        <h2>Passa il telefono al giocatore</h2>

        <div class="big" id="playerLabel"></div>

        <button id="revealBtn">👁️ Scopri ruolo</button>

        <div id="roleReveal" style="margin-top:20px;"></div>

        <button id="nextBtn" class="hidden">➡️ Prossimo giocatore</button>
    `;

    const playerLabel = document.getElementById("playerLabel");
    const roleReveal = document.getElementById("roleReveal");
    const revealBtn = document.getElementById("revealBtn");
    const nextBtn = document.getElementById("nextBtn");

    function loadPlayer(){

        if(currentPlayer >= players){
            alert("Tutti i giocatori hanno visto il ruolo!");
            location.reload();
            return;
        }

        playerLabel.innerText = "Giocatore " + (currentPlayer + 1);
        roleReveal.innerHTML = "";
        revealBtn.classList.remove("hidden");
        nextBtn.classList.add("hidden");
    }

    revealBtn.onclick = () => {

        const role = impostorIndexes.includes(currentPlayer)
            ? "🕵️ IMPOSTORE"
            : secretWord;

        roleReveal.innerHTML = `
            <div class="big ${role === "🕵️ IMPOSTORE" ? "red" : "green"}">
                ${role}
            </div>
        `;

        revealBtn.classList.add("hidden");
        nextBtn.classList.remove("hidden");
    };

    nextBtn.onclick = () => {
        currentPlayer++;
        loadPlayer();
    };

    loadPlayer();
}

/* ONLINE (uguale al tuo originale) */
function showCreateRoom(){
    document.getElementById("onlineMenu").classList.add("hidden");
    document.getElementById("createRoomArea").classList.remove("hidden");
}

function showJoinRoom(){
    document.getElementById("onlineMenu").classList.add("hidden");
    document.getElementById("joinRoomArea").classList.remove("hidden");
}

/* resto del codice online invariato */
function generateCode(){
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ123456789";
    let code = "";
    for(let i=0;i<6;i++){
        code += chars[Math.floor(Math.random()*chars.length)];
    }
    return code;
}

function createRoom(){ /* invariato */ }
function joinRoom(){ /* invariato */ }
function openLobby(){ /* invariato */ }
function listenLobby(){ /* invariato */ }
function renderPlayers(){ /* invariato */ }
function startOnlineGame(){ /* invariato */ }
function showRole(){ /* invariato */ }

</script>

</body>
</html>
