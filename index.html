<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gioco dell'Impostore</title>

<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    color:white;
    font-family:'Exo 2',sans-serif;
    min-height:100vh;
    padding:20px;
    text-align:center;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    font-family:'Orbitron',sans-serif;
    color:#facc15;
    margin-bottom:25px;
    margin-top:20px;
    font-size:2rem;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.hidden{ display:none; }

button{
    border:none;
    padding:14px 22px;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
    margin:8px;
    font-size:15px;
    color:white;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    background:#0f172a;
    color:white;
}

.big{
    font-size:2rem;
    font-weight:900;
    color:#facc15;
}

.red{ color:#ef4444; }
.green{ color:#22c55e; }

</style>
</head>

<body>

<div class="container">

<h1>🕵️ Gioco dell'Impostore</h1>

<!-- MENU INIZIALE -->
<div class="card" id="modeArea">

    <h2>Scegli modalità</h2>

    <button onclick="selectMode('offline')">🟢 Offline</button>
    <button onclick="selectMode('online')">🔵 Online</button>

</div>

<!-- OFFLINE SETUP -->
<div class="card hidden" id="offlineSetup">

    <h2>Modalità Offline</h2>

    <label>Numero giocatori</label>
    <input type="number" id="offlinePlayers" value="5" min="3" max="20">

    <label>Numero impostori</label>
    <input type="number" id="offlineImpostors" value="1" min="1" max="5">

    <label>Categoria</label>
    <select id="offlineCategory">
        <option value="calcio">Calcio</option>
        <option value="musica">Musica</option>
        <option value="film">Film</option>
    </select>

    <button onclick="startOffline()">▶ Inizia partita</button>
    <button onclick="goHome()">🏠 Home</button>

</div>

<!-- ONLINE MENU -->
<div class="card hidden" id="onlineMenu">

    <h2>Modalità Online</h2>

    <button onclick="showCreateRoom()">👑 Crea stanza</button>
    <button onclick="showJoinRoom()">🔑 Entra stanza</button>
    <button onclick="goHome()">🏠 Home</button>

</div>

<!-- GAME OFFLINE -->
<div class="card hidden" id="offlineGame">

    <div id="playerTitle" class="big"></div>

    <div id="roleBox"></div>

    <button id="seeBtn">👁️ Vedi ruolo</button>

    <div>
        <button id="prevBtn">⬅️ Indietro</button>
        <button id="nextBtn">➡️ Avanti</button>
    </div>

    <button onclick="goHome()">🏠 Home</button>

</div>

</div>

<script>

/* FIREBASE (invariato) */
const firebaseConfig = {
    apiKey: "INSERISCI_APIKEY",
    authDomain: "INSERISCI_AUTHDOMAIN",
    databaseURL: "INSERISCI_DATABASE_URL",
    projectId: "INSERISCI_PROJECT_ID",
    storageBucket: "INSERISCI_BUCKET",
    messagingSenderId: "INSERISCI_SENDER",
    appId: "INSERISCI_APPID"
};

let db = null;

if(firebaseConfig.apiKey !== "INSERISCI_APIKEY"){
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
}

/* PAROLE */
const words = {
    calcio:["Messi","Rigore","Champions League","Juventus","Milan"],
    musica:["Spotify","Rap","Concerto","Chitarra","Pianoforte"],
    film:["Batman","Marvel","Netflix","Titanic","Harry Potter"]
};

let playersCount = 0;
let impostors = [];
let secretWord = "";
let current = 0;

/* NAVIGAZIONE MENU */
function selectMode(mode){

    document.getElementById("modeArea").classList.add("hidden");

    if(mode === "offline"){
        document.getElementById("offlineSetup").classList.remove("hidden");
    }

    if(mode === "online"){
        document.getElementById("onlineMenu").classList.remove("hidden");
    }
}

function goHome(){

    document.getElementById("offlineSetup").classList.add("hidden");
    document.getElementById("offlineGame").classList.add("hidden");
    document.getElementById("onlineMenu").classList.add("hidden");

    document.getElementById("modeArea").classList.remove("hidden");

    current = 0;
}

/* OFFLINE GAME */
function startOffline(){

    playersCount = parseInt(document.getElementById("offlinePlayers").value);
    const impostorsCount = parseInt(document.getElementById("offlineImpostors").value);
    const category = document.getElementById("offlineCategory").value;

    secretWord = words[category][Math.floor(Math.random()*words[category].length)];

    impostors = [];

    while(impostors.length < impostorsCount){
        let r = Math.floor(Math.random()*playersCount);
        if(!impostors.includes(r)) impostors.push(r);
    }

    current = 0;

    document.getElementById("offlineSetup").classList.add("hidden");
    document.getElementById("offlineGame").classList.remove("hidden");

    render();
}

function render(){

    if(current >= playersCount){
        document.getElementById("offlineGame").classList.add("hidden");
        document.getElementById("offlineSetup").classList.remove("hidden");
        return;
    }

    document.getElementById("playerTitle").innerText =
        `Giocatore ${current + 1} / ${playersCount}`;

    document.getElementById("roleBox").innerHTML = "";

    document.getElementById("seeBtn").style.display = "inline-block";

    document.getElementById("prevBtn").disabled = current === 0;
    document.getElementById("nextBtn").disabled = current === playersCount - 1;
}

/* VEDI RUOLO */
document.getElementById("seeBtn").onclick = () => {

    const role = impostors.includes(current)
        ? "🕵️ IMPOSTORE"
        : secretWord;

    document.getElementById("roleBox").innerHTML = `
        <div class="big ${role === "🕵️ IMPOSTORE" ? "red" : "green"}">
            ${role}
        </div>
        <p>Passa il telefono al prossimo giocatore</p>
    `;

    document.getElementById("seeBtn").style.display = "none";
};

/* NAVIGAZIONE */
document.getElementById("nextBtn").onclick = () => {
    if(current < playersCount - 1){
        current++;
        render();
    }
};

document.getElementById("prevBtn").onclick = () => {
    if(current > 0){
        current--;
        render();
    }
};

/* ONLINE PLACEHOLDER (invariato) */
function showCreateRoom(){}
function showJoinRoom(){}

</script>

</body>
</html>
