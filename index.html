<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gioco dell'Impostore</title>

<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    color:white;
    font-family:'Exo 2',sans-serif;
    min-height:100vh;
    padding:20px;
    text-align:center;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    font-family:'Orbitron',sans-serif;
    color:#facc15;
    margin:20px 0;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:16px;
    margin-top:20px;
}

.hidden{ display:none; }

button{
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    font-weight:700;
    margin:6px;
    color:white;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

button:disabled{
    opacity:0.4;
}

input,select{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:8px;
    background:#0f172a;
    color:white;
}

.big{
    font-size:2rem;
    font-weight:900;
    margin:10px 0;
    color:#facc15;
}

.red{ color:#ef4444; }
.green{ color:#22c55e; }

</style>
</head>

<body>

<div class="container">

<h1>🕵️ Gioco dell'Impostore</h1>

<!-- SETUP -->
<div class="card" id="setup">

    <h2>Modalità Offline</h2>

    <label>Numero giocatori</label>
    <input type="number" id="players" value="5" min="3" max="20">

    <label>Numero impostori</label>
    <input type="number" id="impostors" value="1" min="1" max="5">

    <label>Categoria</label>
    <select id="category">
        <option value="calcio">Calcio</option>
        <option value="musica">Musica</option>
        <option value="film">Film</option>
    </select>

    <button onclick="startGame()">▶ Inizia</button>

</div>

<!-- GAME -->
<div class="card hidden" id="game">

    <div id="title" class="big"></div>

    <div id="role"></div>

    <button id="seeBtn">👁️ Vedi ruolo</button>

    <div>
        <button id="prevBtn">⬅️ Indietro</button>
        <button id="nextBtn">➡️ Avanti</button>
    </div>

</div>

</div>

<script>

/* PAROLE */
const words = {
    calcio:["Messi","Rigore","Champions League","Juventus","Milan"],
    musica:["Spotify","Rap","Concerto","Chitarra","Pianoforte"],
    film:["Batman","Marvel","Netflix","Titanic","Harry Potter"]
};

let playersCount = 0;
let impostors = [];
let secretWord = "";
let current = 0;

/* START GAME */
function startGame(){

    playersCount = parseInt(document.getElementById("players").value);
    const impostorsCount = parseInt(document.getElementById("impostors").value);
    const category = document.getElementById("category").value;

    secretWord = words[category][Math.floor(Math.random()*words[category].length)];

    impostors = [];

    while(impostors.length < impostorsCount){
        let r = Math.floor(Math.random() * playersCount);
        if(!impostors.includes(r)) impostors.push(r);
    }

    current = 0;

    document.getElementById("setup").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    render();
}

/* RENDER PLAYER */
function render(){

    document.getElementById("title").innerText =
        `Giocatore ${current + 1} / ${playersCount}`;

    document.getElementById("role").innerHTML = "";

    document.getElementById("seeBtn").style.display = "inline-block";

    document.getElementById("prevBtn").disabled = current === 0;
    document.getElementById("nextBtn").disabled = current === playersCount - 1;
}

/* VEDI RUOLO */
document.getElementById("seeBtn").onclick = () => {

    const role = impostors.includes(current)
        ? "🕵️ IMPOSTORE"
        : secretWord;

    document.getElementById("role").innerHTML = `
        <div class="big ${role === "🕵️ IMPOSTORE" ? "red" : "green"}">
            ${role}
        </div>
        <p>Passa il telefono al prossimo giocatore</p>
    `;

    document.getElementById("seeBtn").style.display = "none";
};

/* NAVIGAZIONE */
document.getElementById("nextBtn").onclick = () => {
    if(current < playersCount - 1){
        current++;
        render();
    }
};

document.getElementById("prevBtn").onclick = () => {
    if(current > 0){
        current--;
        render();
    }
};

</script>

</body>
</html>
