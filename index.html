<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gioco dell'Impostore</title>

<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1020;
    color:white;
    font-family:'Exo 2',sans-serif;
    min-height:100vh;
    padding:20px;
    text-align:center;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    font-family:'Orbitron',sans-serif;
    color:#facc15;
    margin-bottom:25px;
    margin-top:20px;
    font-size:2rem;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.hidden{
    display:none;
}

button{
    border:none;
    padding:14px 22px;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
    margin:8px;
    font-size:15px;
    color:white;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

button:hover{
    transform:scale(1.03);
}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    background:#0f172a;
    color:white;
}

label{
    display:block;
    margin-top:18px;
    text-align:left;
    color:#93c5fd;
}

.player{
    background:#0f172a;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
}

.big{
    font-size:2rem;
    font-weight:900;
    color:#facc15;
}

.red{
    color:#ef4444;
}

.green{
    color:#22c55e;
}

.code{
    font-size:2rem;
    color:#facc15;
    font-weight:900;
    letter-spacing:3px;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<h1>🕵️ Gioco dell'Impostore</h1>

<!-- SCELTA MODALITA -->
<div class="card" id="modeArea">

    <h2>Scegli modalità</h2>

    <button onclick="selectMode('offline')">
        🟢 Offline
    </button>

    <button onclick="selectMode('online')">
        🔵 Online
    </button>

</div>

<!-- OFFLINE -->
<div class="card hidden" id="offlineSetup">

    <h2>Modalità Offline</h2>

    <label>Numero giocatori</label>
    <input type="number" id="offlinePlayers" value="5" min="3" max="20">

    <label>Numero impostori</label>
    <input type="number" id="offlineImpostors" value="1" min="1" max="5">

    <label>Categoria</label>

    <select id="offlineCategory">
        <option value="calcio">Calcio</option>
        <option value="musica">Musica</option>
        <option value="film">Film</option>
    </select>

    <button onclick="startOffline()">
        ▶ Inizia partita
    </button>

</div>

<!-- ONLINE MENU -->
<div class="card hidden" id="onlineMenu">

    <h2>Modalità Online</h2>

    <button onclick="showCreateRoom()">
        👑 Crea stanza
    </button>

    <button onclick="showJoinRoom()">
        🔑 Entra stanza
    </button>

</div>

<!-- CREA STANZA -->
<div class="card hidden" id="createRoomArea">

    <h2>Crea stanza</h2>

    <label>Tuo nome</label>
    <input type="text" id="hostName">

    <label>Numero giocatori</label>
    <input type="number" id="roomPlayers" value="5">

    <label>Numero impostori</label>
    <input type="number" id="roomImpostors" value="1">

    <label>Categoria</label>

    <select id="roomCategory">
        <option value="calcio">Calcio</option>
        <option value="musica">Musica</option>
        <option value="film">Film</option>
    </select>

    <button onclick="createRoom()">
        🎮 Crea stanza
    </button>

</div>

<!-- JOIN ROOM -->
<div class="card hidden" id="joinRoomArea">

    <h2>Entra in stanza</h2>

    <label>Nome</label>
    <input type="text" id="joinName">

    <label>Codice stanza</label>
    <input type="text" id="joinCode">

    <button onclick="joinRoom()">
        🚪 Entra
    </button>

</div>

<!-- LOBBY -->
<div class="card hidden" id="lobbyArea">

    <h2>Lobby</h2>

    <div>
        Codice stanza:
        <div class="code" id="roomCodeText"></div>
    </div>

    <div id="playersList"></div>

    <button id="startBtn"
            class="hidden"
            onclick="startOnlineGame()">

        ▶ Avvia partita

    </button>

</div>

<!-- ROLE -->
<div class="card hidden" id="roleArea">

    <h2>Il tuo ruolo</h2>

    <div id="roleCard"></div>

</div>

</div>

<script>

/* =========================================================
   FIREBASE CONFIG
========================================================= */

/*
SE VUOI SOLO OFFLINE:
LASCIA COSI

SE VUOI ONLINE:
INSERISCI LE TUE CHIAVI FIREBASE
*/

const firebaseConfig = {

    apiKey: "INSERISCI_APIKEY",
    authDomain: "INSERISCI_AUTHDOMAIN",
    databaseURL: "INSERISCI_DATABASE_URL",
    projectId: "INSERISCI_PROJECT_ID",
    storageBucket: "INSERISCI_BUCKET",
    messagingSenderId: "INSERISCI_SENDER",
    appId: "INSERISCI_APPID"

};

let db = null;

// ATTIVA FIREBASE SOLO SE CONFIGURATO
if(firebaseConfig.apiKey !== "INSERISCI_APIKEY"){

    firebase.initializeApp(firebaseConfig);

    db = firebase.database();

}

/* =========================================================
   PAROLE
========================================================= */

const words = {

    calcio:[
        "Messi",
        "Rigore",
        "Champions League",
        "Juventus",
        "Milan"
    ],

    musica:[
        "Spotify",
        "Rap",
        "Concerto",
        "Chitarra",
        "Pianoforte"
    ],

    film:[
        "Batman",
        "Marvel",
        "Netflix",
        "Titanic",
        "Harry Potter"
    ]

};

/* =========================================================
   VARIABILI
========================================================= */

let gameMode = "";

let roomCode = "";

let playerId = "";

let isHost = false;

/* =========================================================
   MODALITA
========================================================= */

function selectMode(mode){

    gameMode = mode;

    document.getElementById("modeArea")
        .classList.add("hidden");

    // OFFLINE
    if(mode === "offline"){

        document.getElementById("offlineSetup")
            .classList.remove("hidden");

    }

    // ONLINE
    if(mode === "online"){

        // FIREBASE NON CONFIGURATO
        if(!db){

            alert(
                "Firebase non configurato.\n\n" +
                "Inserisci le chiavi Firebase."
            );

            document.getElementById("modeArea")
                .classList.remove("hidden");

            return;
        }

        document.getElementById("onlineMenu")
            .classList.remove("hidden");

    }

}

/* =========================================================
   OFFLINE
========================================================= */

function startOffline(){

    const players = parseInt(
        document.getElementById("offlinePlayers").value
    );

    const impostors = parseInt(
        document.getElementById("offlineImpostors").value
    );

    const category =
        document.getElementById("offlineCategory").value;

    const secretWord =
        words[category][
            Math.floor(
                Math.random() * words[category].length
            )
        ];

    let impostorIndexes = [];

    while(impostorIndexes.length < impostors){

        let rand = Math.floor(Math.random() * players);

        if(!impostorIndexes.includes(rand)){

            impostorIndexes.push(rand);

        }

    }

    let currentPlayer = 0;

    function showNextPlayer(){

        if(currentPlayer >= players){

            alert(
                "Tutti i giocatori hanno visto il ruolo!"
            );

            location.reload();

            return;

        }

        const role =
            impostorIndexes.includes(currentPlayer)
            ? "🕵️ IMPOSTORE"
            : secretWord;

        alert(
            "Giocatore " +
            (currentPlayer + 1) +
            "\n\n" +
            role
        );

        currentPlayer++;

        showNextPlayer();

    }

    showNextPlayer();

}

/* =========================================================
   ONLINE MENU
========================================================= */

function showCreateRoom(){

    document.getElementById("onlineMenu")
        .classList.add("hidden");

    document.getElementById("createRoomArea")
        .classList.remove("hidden");

}

function showJoinRoom(){

    document.getElementById("onlineMenu")
        .classList.add("hidden");

    document.getElementById("joinRoomArea")
        .classList.remove("hidden");

}

/* =========================================================
   CREA CODICE
========================================================= */

function generateCode(){

    const chars =
        "ABCDEFGHJKLMNPQRSTUVWXYZ123456789";

    let code = "";

    for(let i=0;i<6;i++){

        code += chars[
            Math.floor(Math.random()*chars.length)
        ];

    }

    return code;

}

/* =========================================================
   CREA STANZA
========================================================= */

function createRoom(){

    const name =
        document.getElementById("hostName")
        .value
        .trim();

    if(!name){

        alert("Inserisci il nome");

        return;

    }

    roomCode = generateCode();

    playerId = "p_" + Date.now();

    isHost = true;

    const roomData = {

        host: playerId,

        started:false,

        settings:{

            players: parseInt(
                document.getElementById("roomPlayers").value
            ),

            impostors: parseInt(
                document.getElementById("roomImpostors").value
            ),

            category:
                document.getElementById("roomCategory").value

        },

        players:{}

    };

    roomData.players[playerId] = {

        name:name,

        role:"",
        word:""

    };

    db.ref("rooms/" + roomCode)
        .set(roomData);

    openLobby();

}

/* =========================================================
   JOIN ROOM
========================================================= */

function joinRoom(){

    const name =
        document.getElementById("joinName")
        .value
        .trim();

    roomCode =
        document.getElementById("joinCode")
        .value
        .trim()
        .toUpperCase();

    if(!name || !roomCode){

        alert("Compila tutti i campi");

        return;

    }

    playerId = "p_" + Date.now();

    db.ref("rooms/" + roomCode)
        .once("value")
        .then(snapshot=>{

            if(!snapshot.exists()){

                alert("Stanza non trovata");

                return;

            }

            db.ref(
                "rooms/" +
                roomCode +
                "/players/" +
                playerId
            ).set({

                name:name,

                role:"",
                word:""

            });

            openLobby();

        });

}

/* =========================================================
   OPEN LOBBY
========================================================= */

function openLobby(){

    document.getElementById("createRoomArea")
        .classList.add("hidden");

    document.getElementById("joinRoomArea")
        .classList.add("hidden");

    document.getElementById("lobbyArea")
        .classList.remove("hidden");

    document.getElementById("roomCodeText")
        .innerText = roomCode;

    listenLobby();

}

/* =========================================================
   LISTEN LOBBY
========================================================= */

function listenLobby(){

    db.ref("rooms/" + roomCode)
        .on("value", snapshot=>{

            const data = snapshot.val();

            if(!data) return;

            renderPlayers(data.players);

            if(isHost){

                document.getElementById("startBtn")
                    .classList.remove("hidden");

            }

            if(data.started){

                showRole(
                    data.players[playerId]
                );

            }

        });

}

/* =========================================================
   RENDER PLAYERS
========================================================= */

function renderPlayers(players){

    const list =
        document.getElementById("playersList");

    list.innerHTML = "";

    Object.keys(players).forEach(id=>{

        const p = players[id];

        list.innerHTML += `
            <div class="player">
                ${id === playerId ? "🟢" : "⚪"}
                ${p.name}
                ${id === playerId && isHost ? "👑" : ""}
            </div>
        `;

    });

}

/* =========================================================
   START ONLINE GAME
========================================================= */

function startOnlineGame(){

    db.ref("rooms/" + roomCode)
        .once("value")
        .then(snapshot=>{

            const data = snapshot.val();

            const category =
                data.settings.category;

            const impostorsCount =
                data.settings.impostors;

            const players = data.players;

            const ids = Object.keys(players);

            const secretWord =
                words[category][
                    Math.floor(
                        Math.random() *
                        words[category].length
                    )
                ];

            let impostors = [];

            while(
                impostors.length < impostorsCount
            ){

                let rand =
                    ids[
                        Math.floor(
                            Math.random() *
                            ids.length
                        )
                    ];

                if(!impostors.includes(rand)){

                    impostors.push(rand);

                }

            }

            ids.forEach(id=>{

                players[id].role =
                    impostors.includes(id)
                    ? "impostor"
                    : "player";

                players[id].word =
                    impostors.includes(id)
                    ? ""
                    : secretWord;

            });

            db.ref("rooms/" + roomCode)
                .update({

                    started:true,

                    players:players

                });

        });

}

/* =========================================================
   SHOW ROLE
========================================================= */

function showRole(player){

    document.getElementById("lobbyArea")
        .classList.add("hidden");

    document.getElementById("roleArea")
        .classList.remove("hidden");

    const card =
        document.getElementById("roleCard");

    if(player.role === "impostor"){

        card.innerHTML = `
            <div class="big red">
                🕵️ IMPOSTORE
            </div>

            <p style="margin-top:15px;">
                Bluffa bene!
            </p>
        `;

    }else{

        card.innerHTML = `
            <div class="big green">
                ${player.word}
            </div>

            <p style="margin-top:15px;">
                Ricorda la parola!
            </p>
        `;

    }

}

</script>

</body>
</html>
